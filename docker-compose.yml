version: '3.8'

services:
  postgres:
    image: postgres:16-alpine  # Changed from 15-alpine to 16-alpine
    container_name: devconnect-db
    environment:
      POSTGRES_USER: devconnect_user
      POSTGRES_PASSWORD: devconnect_password
      POSTGRES_DB: devconnect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: